name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build (Unix)
        if: matrix.platform != 'windows'
        run: bash scripts/build.sh "${{ github.ref_name }}" "${{ matrix.platform }}" "${{ matrix.arch }}"

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: bash scripts/build.sh "${{ github.ref_name }}" "${{ matrix.platform }}" "${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: y-plan-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
